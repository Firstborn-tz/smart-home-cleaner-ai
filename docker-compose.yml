version: '3.8'

networks:
  shc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: shc-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${SSL_PORT:-443}:443"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - shc-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shc-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_NAME=${APP_NAME:-SmartCleanAI}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-smart_home_cleaner_tz}
      - DB_USERNAME=${DB_USERNAME:-shc_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_DRIVER=redis
      - FILESYSTEM_DISK=local
      - AI_MICROSERVICE_URL=http://ai-service:8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - shc-network

  mysql:
    image: mysql:8.0-debian
    container_name: shc-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-smart_home_cleaner_tz}
      - MYSQL_USER=${DB_USERNAME:-shc_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shc-network

  redis:
    image: redis:7-alpine
    container_name: shc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shc-network

  ai-service:
    build:
      context: ./ai-microservice
      dockerfile: Dockerfile
    container_name: shc-ai
    restart: unless-stopped
    ports:
      - "${AI_PORT:-8001}:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MODEL_DIR=/app/models
    volumes:
      - ai-models:/app/models
      - ./ai-microservice:/app
      - /app/__pycache__
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shc-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shc-scheduler
    restart: unless-stopped
    command: php /var/www/artisan schedule:work
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-smart_home_cleaner_tz}
      - DB_USERNAME=${DB_USERNAME:-shc_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shc-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  ai-models:
    driver: local
